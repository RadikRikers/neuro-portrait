services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_PULL_MODELS: ${OLLAMA_PULL_MODELS:-llama3.2}
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data: